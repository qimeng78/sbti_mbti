<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SBTI 人格测试 - MBTI 的终结者</title>
    <style>
        :root {
            --bg: #f6faf6;
            --panel: #ffffff;
            --text: #1e2a22;
            --muted: #6a786f;
            --line: #dbe8dd;
            --soft: #edf6ef;
            --accent: #6c8d71;
            --accent-strong: #4d6a53;
            --shadow: 0 16px 40px rgba(47, 73, 55, 0.08);
            --radius: 22px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: radial-gradient(circle at top left, #f8fff8 0, #f6faf6 36%, #f2f7f3 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .shell {
            max-width: 980px;
            margin: 0 auto;
            padding: 24px 16px 56px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .hero {
            padding: 28px;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .hero-minimal {
            min-height: 48vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: clamp(28px, 5vw, 52px);
            line-height: 1.08;
            letter-spacing: -0.03em;
            margin: 0;
        }

        .btn-primary {
            background: var(--accent-strong);
            color: #fff;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 700;
            border: 0;
            cursor: pointer;
            transition: transform .16s ease;
        }

        .btn-secondary {
            background: #fff;
            color: var(--accent-strong);
            padding: 14px 28px;
            border-radius: 14px;
            border: 1px solid var(--line);
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* 测试页样式 */
        .test-wrap {
            padding: 22px;
            margin-top: 22px;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .progress {
            flex: 1;
            height: 10px;
            background: #edf3ee;
            border-radius: 999px;
            overflow: hidden;
        }

        #progressBar {
            display: block;
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #97b59c, #5b7a62);
            transition: width .3s ease;
        }

        .question {
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
            background: #fff;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .question-title {
            font-size: 16px;
            line-height: 1.6;
            font-weight: 500;
        }

        .options {
            display: grid;
            gap: 10px;
            margin-top: 14px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border: 1px solid var(--line);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option:hover {
            background: var(--soft);
            border-color: var(--accent);
        }

        .option input {
            accent-color: var(--accent-strong);
        }

        /* 结果页样式 */
        .result-layout {
            display: grid;
            gap: 20px;
        }

        .result-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .type-box, .analysis-box, .dim-box {
            padding: 24px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: #fff;
        }

        .type-name {
            font-size: 38px;
            font-weight: 800;
            color: var(--accent-strong);
            margin: 10px 0;
        }

        .type-subname {
            color: var(--muted);
            font-style: italic;
            margin-bottom: 15px;
        }

        .analysis-box p {
            line-height: 1.8;
            color: #334139;
            white-space: pre-wrap;
        }

        .dim-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .dim-item {
            border: 1px solid var(--line);
            padding: 15px;
            border-radius: 14px;
        }

        .dim-header {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .dim-bar-bg {
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
        }

        .dim-bar-fill {
            height: 100%;
            background: var(--accent);
            transition: width 1s ease-out;
        }

        @media (max-width: 768px) {
            .result-top {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="shell">
    <section id="intro" class="screen active">
        <div class="hero card hero-minimal">
            <h1>MBTI 已经过时，SBTI 来了。</h1>
            <p style="color: var(--muted); margin: 20px 0;">
                一项旨在通过毒舌揭露你灵魂深处“不可告人”特质的实验性测试。</p>
            <div class="hero-actions">
                <button id="startBtn" class="btn-primary">开始直面自我</button>
            </div>
            <div style="margin-top: 40px; font-size: 12px; color: var(--muted); line-height: 2;">
                原作者：B站 @蛆肉儿串儿 | 适配：铁铁、贝贝
            </div>
        </div>
    </section>

    <section id="test" class="screen">
        <div class="test-wrap card">
            <div class="topbar">
                <div class="progress"><span id="progressBar"></span></div>

            </div>
            <div id="questionList"></div>
            <div style="display: flex; justify-content: space-between; margin-top: 30px; align-items: center;">
                <div id="testHint" style="font-size: 13px; color: var(--muted);">回答所有问题以解锁结果</div>
                <button id="submitBtn" class="btn-primary" disabled>查看判决书</button>
            </div>
        </div>
    </section>

    <section id="result" class="screen">
        <div class="result-layout">
            <div class="result-top">
                <div class="type-box">
                    <div style="font-size: 12px; color: var(--accent);">你的核心人格类型</div>
                    <div id="resultTypeName" class="type-name">加载中...</div>
                    <div id="resultTypeSub" class="type-subname"></div>
                    <div style="background: var(--soft); padding: 10px; border-radius: 10px; font-size: 13px; color: var(--accent-strong);">
                        匹配度：98.7% (高危)
                    </div>
                </div>
                <div class="analysis-box">
                    <h3>深度解读</h3>
                    <p id="resultDesc"></p>
                </div>
            </div>

            <div class="dim-box">
                <h3>十五维度数据分析</h3>
                <div id="dimList" class="dim-list"></div>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button onclick="location.reload()" class="btn-secondary">重新洗心革面</button>
            </div>
        </div>
    </section>
</div>

        },

    // --- 逻辑控制 ---
    let userAnswers = {};

    document.getElementById('startBtn').onclick = () => {
        document.getElementById('intro').classList.remove('active');
        document.getElementById('test').classList.add('active');
        renderQuestions();
    };

    function renderQuestions() {
        const container = document.getElementById('questionList');
        container.innerHTML = questions.map((q, i) => `
        <div class="question">
          <div class="question-meta"><span>维度: ${dimensionMeta[q.dim]}</span><span>${i + 1}/30</span></div>
          <div class="question-title">${q.text}</div>
          <div class="options">
            ${q.options.map(opt => `
              <label class="option">
                <input type="radio" name="${q.id}" value="${opt.v}" onchange="handleSelect('${q.id}', ${opt.v})">
                ${opt.label}
              </label>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    window.handleSelect = (id, val) => {
        userAnswers[id] = val;
        const count = Object.keys(userAnswers).length;
        document.getElementById('progressBar').style.width = (count / questions.length * 100) + '%';
        document.getElementById('progressText').innerText = `${count} / ${questions.length}`;
        if (count === questions.length) document.getElementById('submitBtn').disabled = false;
    };

    document.getElementById('submitBtn').onclick = () => {
        document.getElementById('test').classList.remove('active');
        document.getElementById('result').classList.add('active');
        showResult();
    };

    function showResult() {
        // 模拟计算逻辑：基于特定维度的分值倾向
        // 正常开发中应统计各维度均值，这里简化为示例
        const r = TYPE_LIBRARY["INTJ"]; // 默认结果

        document.getElementById('resultTypeName').innerText = r.cn;
        document.getElementById('resultTypeSub').innerText = r.intro;
        document.getElementById('resultDesc').innerText = r.desc;

        // 渲染十五维度
        const dimBox = document.getElementById('dimList');
        dimBox.innerHTML = Object.keys(dimensionMeta).map(key => {
            const val = Math.floor(Math.random() * 60) + 30; // 模拟得分
            return `
          <div class="dim-item">
            <div class="dim-header"><span>${dimensionMeta[key]}</span><span>${val}%</span></div>
            <div class="dim-bar-bg"><div class="dim-bar-fill" style="width:${val}%"></div></div>
          </div>
        `;
        }).join('');
    }
</script>
